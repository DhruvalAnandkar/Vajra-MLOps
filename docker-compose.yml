services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:28082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr internal://redpanda:28082,external://localhost:8082
    ports:
      - "9092:9092"
      - "28082:28082"
      - "29092:29092"
      - "8082:8082"
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health" ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - mlops_net

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: metrics_db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d metrics_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mlops_net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: fastapi_api
    ports:
      - "8000:8000"
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=redpanda:29092
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=metrics_db
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./production_registry.json:/app/production_registry.json
      - ./models:/app/models
    networks:
      - mlops_net

  consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: metrics_consumer
    command: [ "python", "scripts/run_consumer.py" ]
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=redpanda:29092
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=metrics_db
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
    networks:
      - mlops_net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: react_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mlops_net

networks:
  mlops_net:
    driver: bridge
